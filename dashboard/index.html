<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>SignalOps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='1.5' y='1.5' width='29' height='29' rx='7' fill='%230b0e14' stroke='%235b8cff' stroke-width='2'/%3E%3Cpolyline points='7 21 11 21 13 16 17 24 20 10 22 15' fill='none' stroke='%235b8cff' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='24.5' cy='11' r='2.2' fill='%233ddc84'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/app.css" />
</head>

<body>
  <header>
    <div class="brand">
      <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
        <rect x="1.5" y="1.5" width="29" height="29" rx="7" fill="none" stroke="var(--accent)" stroke-width="2" />
        <polyline points="7 21 11 21 13 16 17 24 20 10 22 15" fill="none" stroke="var(--accent)" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="24.5" cy="11" r="2.2" fill="var(--ok)" />
      </svg>
      <h1 id="app-title">Signal<span class="ops">Ops</span></h1>
    </div>
    <div class="header-actions">
      <span class="status-pill" id="build-state">checking…</span>
    </div>
  </header>

  <main>
    <section>
      <h2>Rebuilding</h2>
      <div class="pipeline-note">
        <strong>SignalOps v2 is under construction on this branch.</strong>
        The monitoring pipeline has been removed. The workflow platform — login, onboarding,
        the agent catalogue and the two workflows — is being built in its place.
      </div>
      <div id="phases" class="kb-library"></div>
    </section>
  </main>

  <script src="/static/app.js" defer></script>
</body>

</html>
