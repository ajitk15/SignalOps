<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>SignalOps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='1.5' y='1.5' width='29' height='29' rx='7' fill='%230b0e14' stroke='%235b8cff' stroke-width='2'/%3E%3Cpolyline points='7 21 11 21 13 16 17 24 20 10 22 15' fill='none' stroke='%235b8cff' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='24.5' cy='11' r='2.2' fill='%233ddc84'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/app.css" />
</head>

<body>
  <!-- Login gate. Shown until /api/auth/me succeeds. -->
  <div id="login-screen" class="login-screen hidden">
    <form class="login-card" id="login-form" onsubmit="doLogin(event)">
      <div class="brand login-brand">
        <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
          <rect x="1.5" y="1.5" width="29" height="29" rx="7" fill="none" stroke="var(--accent)" stroke-width="2" />
          <polyline points="7 21 11 21 13 16 17 24 20 10 22 15" fill="none" stroke="var(--accent)" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="24.5" cy="11" r="2.2" fill="var(--ok)" />
        </svg>
        <h1>Signal<span class="ops">Ops</span></h1>
      </div>

      <div class="login-warning hidden" id="bootstrap-note">
        <strong>First run.</strong> No accounts exist yet, so this creates the first
        administrator. Everyone else is invited from Settings once you are in.
      </div>

      <label for="login-email">Email</label>
      <input id="login-email" class="draft-field" type="email" required autocomplete="username"
        placeholder="you@company.com" />

      <label for="login-name" class="hidden" id="login-name-label">Your name</label>
      <input id="login-name" class="draft-field hidden" placeholder="e.g. Ajit"
        autocomplete="name" />

      <label for="login-password">Password</label>
      <input id="login-password" class="draft-field" type="password" required
        autocomplete="current-password" placeholder="Your password" />
      <p class="dialog-note" id="login-hint"></p>

      <p><button class="button" type="submit" id="login-submit">Sign in</button></p>
      <p id="login-status" class="dialog-note"></p>
    </form>
  </div>

  <!-- Application shell. Operate above the line, Configure below it. -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand sidebar-brand">
        <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
          <rect x="1.5" y="1.5" width="29" height="29" rx="7" fill="none" stroke="var(--accent)" stroke-width="2" />
          <polyline points="7 21 11 21 13 16 17 24 20 10 22 15" fill="none" stroke="var(--accent)" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="24.5" cy="11" r="2.2" fill="var(--ok)" />
        </svg>
        <h1>Signal<span class="ops">Ops</span></h1>
      </div>

      <nav id="nav"></nav>

      <div class="sidebar-foot">
        <div id="who" class="who"></div>
        <button class="button ghost" onclick="doLogout()">Sign out</button>
      </div>
    </aside>

    <div class="content">
      <header class="content-head">
        <h2 id="view-title">Workflows</h2>
        <div class="header-actions">
          <span id="killswitch-pill" class="status-pill hidden"></span>
          <span id="conn" class="conn down">connecting…</span>
        </div>
      </header>
      <main id="view"></main>
    </div>
  </div>

  <div id="toast" role="status"></div>
  <script src="/static/app.js" defer></script>
</body>

</html>
