<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>SignalAIOps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <meta id="theme-color" name="theme-color" content="#0b1420" />
  <script>
    (() => {
      const key = "signalaiops-theme";
      let theme = "dark";
      try {
        theme = localStorage.getItem(key)
          || (window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
      } catch {
        theme = "dark";
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="icon" type="image/png" sizes="512x512"
    href="/static/signalaiops-favicon-v3.png" />
  <link rel="apple-touch-icon" href="/static/signalaiops-favicon-v3.png" />
  <link rel="stylesheet" href="/static/app.css" />
</head>

<body>
  <a class="skip-link" href="#view">Skip to main content</a>

  <!-- Login gate. Shown until /api/auth/me succeeds. -->
  <div id="login-screen" class="login-screen hidden">
    <button class="theme-toggle login-theme-toggle" type="button" onclick="toggleTheme()"
      data-theme-toggle aria-label="Switch color theme">
      <span class="theme-icon" data-theme-icon aria-hidden="true">☀</span>
      <span data-theme-label>Light</span>
    </button>
    <form class="login-card" id="login-form" onsubmit="doLogin(event)">
      <h1 class="brand login-brand">
        <img class="brand-logo brand-logo-dark" src="/static/signalaiops-logo-dark-v3.png"
          alt="SignalAIOps" />
        <img class="brand-logo brand-logo-light" src="/static/signalaiops-logo-light-v3.png"
          alt="SignalAIOps" />
      </h1>

      <div class="login-warning hidden" id="bootstrap-note"></div>

      <label for="login-email">Email</label>
      <input id="login-email" class="draft-field" type="email" required autocomplete="username"
        placeholder="you@company.com" />

      <label for="login-password">Password</label>
      <input id="login-password" class="draft-field" type="password" required
        autocomplete="current-password" placeholder="Your password" />
      <p class="dialog-note" id="login-hint"></p>

      <p><button class="button" type="submit" id="login-submit">Sign in</button></p>
      <p id="login-status" class="dialog-note" role="alert" aria-live="assertive"></p>
    </form>
  </div>

  <!-- Application shell. Operate above the line, Configure below it. -->
  <div id="app" class="app hidden">
    <!-- Mobile top bar: only visible below the drawer breakpoint. -->
    <div class="mobile-bar">
      <button class="icon-button nav-toggle" type="button" onclick="toggleNav()"
        aria-label="Open navigation" aria-controls="sidebar" aria-expanded="false"
        id="nav-toggle">☰</button>
      <img class="brand-logo brand-logo-dark mobile-logo" src="/static/signalaiops-logo-dark-v3.png"
        alt="SignalAIOps" />
      <img class="brand-logo brand-logo-light mobile-logo" src="/static/signalaiops-logo-light-v3.png"
        alt="SignalAIOps" />
      <button class="theme-toggle" type="button" onclick="toggleTheme()"
        data-theme-toggle aria-label="Switch color theme">
        <span class="theme-icon" data-theme-icon aria-hidden="true">☀</span>
      </button>
    </div>
    <div class="nav-scrim" id="nav-scrim" onclick="closeNav()" hidden></div>

    <aside class="sidebar" id="sidebar">
      <div class="brand sidebar-brand">
        <img class="brand-logo brand-logo-dark" src="/static/signalaiops-logo-dark-v3.png"
          alt="SignalAIOps" />
        <img class="brand-logo brand-logo-light" src="/static/signalaiops-logo-light-v3.png"
          alt="SignalAIOps" />
      </div>

      <nav id="nav" aria-label="Primary"></nav>

      <div class="sidebar-foot">
        <div id="who" class="who"></div>
      </div>
    </aside>

    <div class="content">
      <header class="content-head">
        <h1 id="view-title">Home</h1>
        <div class="header-actions">
          <button class="theme-toggle" type="button" onclick="toggleTheme()"
            data-theme-toggle aria-label="Switch color theme">
            <span class="theme-icon" data-theme-icon aria-hidden="true">☀</span>
            <span data-theme-label>Light</span>
          </button>
          <span id="killswitch-pill" class="status-pill hidden"></span>
          <span id="conn" class="conn down">connecting…</span>
        </div>
      </header>
      <main id="view" tabindex="-1"></main>
    </div>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>
  <script src="/static/app.js" defer></script>
</body>

</html>
