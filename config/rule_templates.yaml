# Rule template catalog, grouped by platform.
#
# `metrics` is the vocabulary contract for a platform: a collector pointed at
# that product must emit these metric names, and any rule using one of them is
# attributed to this platform in the dashboard when it has no explicit
# `platform:` field of its own.
#
# `shared_metrics` are generic across platforms. A rule using only these is
# labelled "Common" rather than being attributed to whichever platform happens
# to list it first - a wrong badge is worse than an honest one.
#
# Every template maps onto the engine's existing condition types
# (greater_than [+ escalate], not_in, rising) - no engine changes needed.

shared_metrics:
- error_count
- exception_count
platforms:
- id: ibm_mq
  name: IBM MQ
  metrics:
  - queue_depth
  - channel_status
  templates:
  - category: Availability / status
    label: Channel not running
    rule:
      metric: channel_status
      condition:
        type: not_in
        values:
        - RUNNING
        - INACTIVE
      severity: P2
      message: Channel status is {value_text}
  - category: Backlog / depth
    label: Queue depth over threshold
    rule:
      metric: queue_depth
      condition:
        type: greater_than
        value: ${threshold}
        default: 1000
      severity: P3
      escalate:
        at_factor: 2
        severity: P2
      message: Queue depth {value_int} exceeds threshold {threshold_int}
  - category: Errors
    label: Errors present
    rule:
      metric: error_count
      condition:
        type: greater_than
        value: ${threshold}
        default: 0
      severity: P2
      message: '{metric} is {value}'
  - category: Latency
    label: Oldest message too old
    rule:
      metric: oldest_message_age_s
      condition:
        type: greater_than
        value: ${threshold}
        default: 300
      severity: P3
      escalate:
        at_factor: 2
        severity: P2
      message: Oldest message age {value_int}s exceeds {threshold_int}s
- id: ibm_ace
  name: IBM ACE
  metrics:
  - ace_flow_status
  - queue_backlog
  - flow_latency_ms
  templates:
  - category: Availability / status
    label: Flow not running
    rule:
      metric: ace_flow_status
      condition:
        type: not_in
        values:
        - RUNNING
        - STARTED
      severity: P2
      message: ACE flow status is {value_text}
  - category: Backlog / depth
    label: Flow input backlog
    rule:
      metric: queue_backlog
      condition:
        type: greater_than
        value: ${threshold}
        default: 500
      severity: P3
      escalate:
        at_factor: 2
        severity: P2
      message: Flow backlog {value_int} exceeds threshold {threshold_int}
  - category: Errors
    label: Flow exceptions
    rule:
      metric: exception_count
      condition:
        type: greater_than
        value: ${threshold}
        default: 0
      severity: P2
      message: '{metric} is {value}'
  - category: Latency
    label: Flow latency high
    rule:
      metric: flow_latency_ms
      condition:
        type: greater_than
        value: ${threshold}
        default: 2000
      severity: P3
      message: Flow latency {value_int}ms exceeds {threshold_int}ms
- id: apigee
  name: Apigee
  metrics:
  - proxy_status
  - quota_used_percent
  - http_5xx_rate
  - proxy_latency_ms
  templates:
  - category: Availability / status
    label: Proxy not deployed/up
    rule:
      metric: proxy_status
      condition:
        type: not_in
        values:
        - UP
        - DEPLOYED
      severity: P2
      message: API proxy status is {value_text}
  - category: Backlog / depth
    label: Quota nearly exhausted
    rule:
      metric: quota_used_percent
      condition:
        type: greater_than
        value: ${threshold}
        default: 90
      severity: P3
      message: Quota usage {value_int}% exceeds {threshold_int}%
  - category: Errors
    label: 5xx error rate high
    rule:
      metric: http_5xx_rate
      condition:
        type: greater_than
        value: ${threshold}
        default: 5
      severity: P2
      message: 5xx rate {value}% exceeds {threshold}%
  - category: Latency
    label: Proxy latency high
    rule:
      metric: proxy_latency_ms
      condition:
        type: greater_than
        value: ${threshold}
        default: 1000
      severity: P3
      escalate:
        at_factor: 2
        severity: P2
      message: Proxy latency {value_int}ms exceeds {threshold_int}ms
- id: datapower
  name: DataPower
  metrics:
  - object_status
  - pending_transactions
  - error_rate
  - latency_ms
  - cpu_percent
  - memory_percent
  templates:
  - category: Availability / status
    label: Object down
    rule:
      metric: object_status
      condition:
        type: not_in
        values:
        - UP
        - ENABLED
      severity: P2
      message: DataPower object status is {value_text}
  - category: Backlog / depth
    label: Pending transactions high
    rule:
      metric: pending_transactions
      condition:
        type: greater_than
        value: ${threshold}
        default: 100
      severity: P3
      escalate:
        at_factor: 2
        severity: P2
      message: Pending transactions {value_int} exceed threshold {threshold_int}
  - category: Errors
    label: Error rate high
    rule:
      metric: error_rate
      condition:
        type: greater_than
        value: ${threshold}
        default: 5
      severity: P2
      message: Error rate {value}% exceeds {threshold}%
  - category: Latency
    label: Service latency high
    rule:
      metric: latency_ms
      condition:
        type: greater_than
        value: ${threshold}
        default: 1000
      severity: P3
      message: Latency {value_int}ms exceeds {threshold_int}ms
  - category: Resources
    label: CPU high
    rule:
      metric: cpu_percent
      condition:
        type: greater_than
        value: ${threshold}
        default: 85
      severity: P3
      escalate:
        at_factor: 1.1
        severity: P2
      message: CPU {value_int}% exceeds {threshold_int}%
  - category: Resources
    label: Memory high
    rule:
      metric: memory_percent
      condition:
        type: greater_than
        value: ${threshold}
        default: 85
      severity: P3
      message: Memory {value_int}% exceeds {threshold_int}%
- id: java
  name: Java / JVM
  metrics:
  - app_health
  - queue_size
  - exception_count
  - gc_pause_ms
  - heap_used_percent
  - thread_count
  templates:
  - category: Availability / status
    label: App health check failing
    rule:
      metric: app_health
      condition:
        type: not_in
        values:
        - UP
        - HEALTHY
        - OK
      severity: P2
      message: Application health is {value_text}
  - category: Backlog / depth
    label: Internal queue growing
    rule:
      metric: queue_size
      condition:
        type: rising
      severity: P3
      message: 'Queue size is rising across {trend_points} observations: {history}'
  - category: Errors
    label: Unhandled exceptions
    rule:
      metric: exception_count
      condition:
        type: greater_than
        value: ${threshold}
        default: 0
      severity: P2
      message: '{metric} is {value}'
  - category: Latency
    label: GC pause long
    rule:
      metric: gc_pause_ms
      condition:
        type: greater_than
        value: ${threshold}
        default: 500
      severity: P3
      message: GC pause {value_int}ms exceeds {threshold_int}ms
  - category: Resources
    label: Heap high
    rule:
      metric: heap_used_percent
      condition:
        type: greater_than
        value: ${threshold}
        default: 85
      severity: P3
      escalate:
        at_factor: 1.1
        severity: P2
      message: Heap usage {value_int}% exceeds {threshold_int}%
  - category: Resources
    label: Thread count rising
    rule:
      metric: thread_count
      condition:
        type: rising
      severity: P3
      message: 'Thread count is rising across {trend_points} observations: {history}'
