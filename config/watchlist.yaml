# Source-driven watchlist. Each source names a collector kind from the
# collectors/ registry; its targets become Observations. Read-only,
# non-production objects only.
#
# Labels drive fingerprinting and (Phase 2) correlation:
#   service     — the SHARED logical service. The same queue observed on
#                 MQNODE1 and MQNODE2 carries one service value, so its
#                 findings correlate as one thing.
#   environment — deployment environment; part of every fingerprint.
#
# NOTE: QL.LOCAL deliberately has no `role: dlq` label. It never matched the
# DLQ name heuristic either, so adding the label now would change severity
# behaviour; it stays a threshold-watched queue until that change is intended.

poll_interval_seconds: 60
max_consecutive_failures_before_backoff: 3
backoff_multiplier: 2
max_backoff_seconds: 600

sources:
  - name: mq_mcp
    kind: mq_mcp
    platform: ibm_mq
    targets:
      - object_type: queue
        name: QL.INPUT
        metric: queue_depth
        threshold: 5
        labels: {service: orders-intake, environment: dev}
      - object_type: queue
        name: QL.LOCAL
        metric: queue_depth
        threshold: 1
        labels: {service: orders-local, environment: dev}
    # channels: SYSTEM.DEF.SVRCONN parked — a template SVRCONN "not running"
    # may just mean no client connected recently. Add real channels as
    # {object_type: channel, name: ..., metric: channel_status} targets.
