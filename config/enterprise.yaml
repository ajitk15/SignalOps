# Enterprise pipeline controls. Collection and detection never call an LLM.
detection:
  # Only guards repeats before an incident row exists; once one does, its
  # status decides (an active incident suppresses indefinitely).
  dedup_window_seconds: 900
  # A recurrence within this long after an incident was closed reopens it
  # instead of opening a new one — the flapping guard.
  reopen_window_seconds: 600
  minimum_ai_severity: P3
  maximum_ai_calls_per_incident: 2
  default_depth_threshold: 1000
  trend_points: 3

knowledge:
  similarity_threshold: 0.55
  zero_ai_reuse_threshold: 0.80
