# ServiceNow delivery mapping. Credentials are NOT here — they come from the
# environment (SN_INSTANCE_URL, SN_READ_USER/PASSWORD, SN_WRITE_USER/PASSWORD),
# and SERVICENOW_MODE controls delivery: dry_run (default) | live | off.

assignment_group: InfraSupport
category: Middleware

# Knowledge base for approved-article delivery (kb_knowledge table).
# sys_id or exact name; empty uses the instance default.
kb_knowledge_base: ""

# SignalOps status -> ServiceNow incident state value, pushed when an incident
# reaches a terminal state here. Defaults match the stock ServiceNow states.
state_map:
  resolved: 6      # Resolved
  closed: 7        # Closed
  false_positive: 8  # Canceled

severity_map:
  P1: {urgency: 1, impact: 1}
  P2: {urgency: 2, impact: 2}
  P3: {urgency: 3, impact: 3}
  P4: {urgency: 3, impact: 3}
